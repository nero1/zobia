name: Integration Tests

on:
  push:
    branches:
      - main
      - 'claude/**'
    paths:
      - 'apps/web/**'
      - '!apps/web/**/*.md'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '!apps/web/**/*.md'

jobs:
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    # PostgreSQL service container — all migrations applied before tests run
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zobia_test
          POSTGRES_USER: zobia
          POSTGRES_PASSWORD: zobia_test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://zobia:zobia_test_pw@localhost:5432/zobia_test
      SKIP_ENV_VALIDATION: "1"
      NODE_ENV: test

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration

  drizzle-schema-check:
    name: Drizzle Schema Consistency
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    env:
      SKIP_ENV_VALIDATION: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile check (catches schema type mismatches)
        run: npm run type-check

      - name: Drizzle schema validation
        run: npx drizzle-kit check
        env:
          DATABASE_URL: ""
        continue-on-error: true
