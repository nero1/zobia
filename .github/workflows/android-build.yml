name: Android APK Build

on:
  push:
    branches:
      - android
      - claude/android-app-rewrite-strategy-ddzvem
      - claude/zobia-android-monorepo-k04rcv
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20.19.4
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies (root workspace)
        run: npm ci

      - name: Build Vite app
        working-directory: apps/android
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WEB_BASE_URL: ${{ secrets.VITE_WEB_BASE_URL }}
          VITE_APP_ENV: production

      - name: Copy dist to android assets
        run: |
          mkdir -p apps/android/android/app/src/main/assets/public
          cp -r apps/android/dist/. apps/android/android/app/src/main/assets/public/

      - name: Set Gradle permissions
        working-directory: apps/android/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: apps/android/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zobia-debug-${{ github.run_number }}-${{ github.sha }}
          path: apps/android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
