name: Android APK Build

on:
  push:
    branches:
      - main
      - android
      - claude/android-app-rewrite-strategy-ddzvem
      - claude/zobia-android-monorepo-k04rcv
      - claude/android-build-classnotfound-ag1r3x
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20.19.4
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies (root workspace)
        run: npm ci

      # `npm run build` runs `vite build && cap copy android`. The `cap copy` step
      # generates capacitor.config.json and capacitor.plugins.json into the android
      # assets dir and copies the web bundle into assets/public. Without those files
      # the native bridge registers NO plugins at runtime (Browser.open / appUrlOpen /
      # Network all reject with "plugin is not implemented on android"), which is what
      # caused the "Authentication failed" error.
      - name: Build Vite app + sync Capacitor assets
        working-directory: apps/android
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WEB_BASE_URL: ${{ secrets.VITE_WEB_BASE_URL }}
          VITE_APP_ENV: production
          # Force-enable the on-device debug overlay even in production-flavoured
          # debug APKs so errors are visible on mobile (no console/CLI available).
          VITE_DEBUG_OVERLAY: '1'

      - name: Set Gradle permissions
        working-directory: apps/android/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: apps/android/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zobia-debug-${{ github.run_number }}-${{ github.sha }}
          path: apps/android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
